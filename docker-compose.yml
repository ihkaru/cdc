services:
  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RPA_URL=http://vpn:8000
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  vpn:
    build: ./vpn
    container_name: cdc-vpn
    privileged: true
    devices:
      - /dev/net/tun
      - /dev/ppp
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - VPN_HOST=akses.bps.go.id
      - VPN_TEST_URL=https://fasih-sm.bps.go.id
      - VPN_TRUSTED_CERT=${VPN_TRUSTED_CERT}
      - VPN_USER=${VPN_USER}
      - VPN_PASS=${VPN_PASS}
      - VPN_COOKIE=${VPN_COOKIE}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -fks --connect-timeout 5 --max-time 8 https://fasih-sm.bps.go.id/oauth_login.html -o /dev/null && echo ok || exit 1" ]
      interval: 30s
      timeout: 12s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    stop_grace_period: 15s

  rpa:
    build: ./rpa
    container_name: cdc-rpa
    init: true
    # IMPORTANT: network_mode shares VPN network namespace.
    # To rebuild RPA WITHOUT restarting VPN (to preserve cookie), only rebuild rpa image:
    #   docker compose build rpa && docker compose up -d --no-deps rpa
    network_mode: "service:vpn"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - SKIP_DETAIL_FETCH=${SKIP_DETAIL_FETCH:-false}
      - FASIH_CONCURRENCY=${FASIH_CONCURRENCY:-3}
      - FETCH_CONCURRENCY=${FETCH_CONCURRENCY:-3}
      - TARGET_URL=${TARGET_URL:-https://fasih-sm.bps.go.id}
    depends_on:
      vpn:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped

  vpn-auth:
    build: ./rpa
    container_name: cdc-vpn-auth
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "8001:8000"
    command: uvicorn src.app:app --host 0.0.0.0 --port 8000

  archiver:
    build: ./rpa
    container_name: cdc-archiver
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-cdcadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-cdcsecret}
      - S3_BUCKET=${S3_BUCKET:-survey-images}
      - S3_ENDPOINT=http://s3:8333
    depends_on:
      - vpn
      - postgres
      - s3
    command: python src/archiver.py
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-fasih}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-fasih_dashboard}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fasih}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- SeaweedFS Image Vault Stack ---
  master:
    image: chrislusf/seaweedfs:latest
    ports:
      - "9333:9333"
    command: "master -ip=master"
    restart: unless-stopped

  volume:
    image: chrislusf/seaweedfs:latest
    command: "volume -mserver=master:9333 -port=8080 -dir=/data"
    depends_on:
      - master
    volumes:
      - seaweed_data:/data
    restart: unless-stopped

  filer:
    image: chrislusf/seaweedfs:latest
    command: 'filer -master=master:9333'
    depends_on:
      - master
      - postgres
    environment:
      - WEED_FILER_POSTGRES_ENABLED=true
      - WEED_FILER_POSTGRES_HOSTNAME=postgres
      - WEED_FILER_POSTGRES_PORT=5432
      - WEED_FILER_POSTGRES_USERNAME=${POSTGRES_USER:-fasih}
      - WEED_FILER_POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - WEED_FILER_POSTGRES_DATABASE=${POSTGRES_DB:-fasih_dashboard}
      - WEED_FILER_POSTGRES_SSLMODE=disable
    restart: unless-stopped

  s3:
    image: chrislusf/seaweedfs:latest
    command: "s3 -filer=filer:8888"
    ports:
      - "8333:8333"
    environment:
      - SEAWEEDFS_S3_ACCESS_KEY=${S3_ACCESS_KEY:-cdcadmin}
      - SEAWEEDFS_S3_SECRET_KEY=${S3_SECRET_KEY:-cdcsecret}
    depends_on:
      - filer
    restart: unless-stopped

volumes:
  pg_data:
  seaweed_data:
