services:
  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - RPA_URL=http://vpn:8000
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  vpn:
    build: ./vpn
    container_name: cdc-vpn
    privileged: true
    devices:
      - /dev/net/tun
      - /dev/ppp
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - VPN_HOST=akses.bps.go.id
      - VPN_TEST_URL=https://fasih-sm.bps.go.id
      - VPN_TRUSTED_CERT=${VPN_TRUSTED_CERT}
      - VPN_USER=${VPN_USER}
      - VPN_PASS=${VPN_PASS}
      - VPN_COOKIE=${VPN_COOKIE}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "ip addr show ppp0 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  rpa:
    build: ./rpa
    container_name: cdc-rpa
    init: true
    # ports: # Pindahkan port mapping ke vpn jika ingin akses dari luar
    #   - "8000:8000"
    network_mode: "service:vpn"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      vpn:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-fasih}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-fasih_dashboard}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fasih}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pg_data:
