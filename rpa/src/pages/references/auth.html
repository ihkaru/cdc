<!DOCTYPE html>
<html lang="en" class="main-app">

<head>

    <meta charset="UTF-8">

    <meta name="robots" content="noindex, nofollow" />

    <meta http-equiv="X-UA-Compatible" content="IE=8; IE=EDGE">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta name="apple-itunes-app" content="app-id=1475674905">

    <link rel="shortcut icon" type="image/x-icon" href=/XX/YY/ZZ/CI/CGAHDHNCJGDGPGOG />

    <link rel="shortcut icon" href="https://www.bps.go.id/favicon-32x32.png" />

    <link rel="manifest" href="/favicon/site.webmanifest" />

    <link rel="mask-icon" href="/favicon/safari-pinned-tab.svg" color="#d43527" />

    <link href="/styles.css" rel="stylesheet" type="text/css">

    <link href="/css/legacy-main.css" rel="stylesheet" type="text/css">
    <title>
        Login to VPN BPS
    </title>

</head>

<body>
    <div>https://akses.bps.go.id/remote/login?lang=en</div>

    <div class="view-container">

        <form class="prompt legacy-prompt" action="/remote/logincheck" method="post" name="f" autocomplete="off">

            <div class="content with-header">

                <div class="header">

                    <img src=/XX/YY/ZZ/CI/CGAHDHNCMGPGHGPG width="48" height="auto">

                    <div id="login-login">
                        &nbsp;&nbsp;&nbsp;Login to VPN BPS
                    </div>

                </div>

                <div class="sub-content">

                    <div class="wide-inputs" style="display:none">
                        <!--remoteauthtimeout=600-->
                        <input type="text" name="username" id="username" placeholder="Name"><input type="password"
                            name="credential" id="credential" placeholder="Password" maxlength="128">
                        <div class="info-message" id="token_msg" style="display: none;">
                            <div class="message-content" id="token_label"></div>
                        </div><input type="password" style="display: none;" maxlength="128" name="credential2"
                            id="credential2"><input type="password" style="display: none;" maxlength="128"
                            name="credential3" id="credential3">
                        <div class="button-actions wide"><button class="primary" type="button" name="ftm_push_button"
                                id="ftm_push_button" onclick="try_ftm_push()    " style="display: none" disabled>Use FTM
                                Push</button></div><input type="password" style="display: none;" placeholder="Token"
                            name="code" id="code">
                        <div id="driftmsg" style="display: none;" class="warning-message">Token clock drift detected.
                            Please input the next code and continue.</div><input type="password" style="display: none;"
                            name="code2" id="code2" placeholder="Next Token Code">
                    </div>

                    <div class="button-actions wide">

                        <button class="primary" type="button" name="login_button" id="login_button"
                            onClick="try_login()" style="display:none">
                            Login
                        </button>

                        <button id="saml-login-bn" class="primary" type="button" name="saml_login_bn"
                            onClick="launchSamlLogin()">
                            Login SSO BPS
                        </button>

                    </div>

                </div>

            </div>

        </form>

    </div>

</body>
<input type=hidden name="ftm_push_enabled" id="ftm_push_enabled" value="1"><input type=hidden name=just_logged_in
    value=1><input type=hidden name=magic id=magic_id value=""><input type=hidden name=reqid id=reqid_id
    value="0"><input type=hidden name=grpid id=grpid_id value=""><input type=hidden name=realm id=realm_id
    value=""><input type=hidden name=redir value="/sslvpn/portal/index.html"><input type=hidden name=saml_login
    id=saml_login_id value="1">
<script type="text/javascript" src="/js/legacy_theme_setup.js"></script>
<script type="text/javascript" src="/sslvpn/js/login.js "></script>
<script type="text/javascript" src="/remote/fgt_lang?lang=en"></script>
<script>document.onkeydown = key_pressdown; function load_login_strings() { var tmp = document.getElementById("err_val"); var name = document.getElementById("username"); var pass = document.getElementById("credential"); if (tmp) { tmp.innerHTML = fgt_lang["error"] + ": " + fgt_lang[tmp.getAttribute('title')]; } name.placeholder = fgt_lang["Username"]; pass.placeholder = fgt_lang["sslvpn_portal::Password"]; } window.onload = load_login_strings;</script>

</html>
